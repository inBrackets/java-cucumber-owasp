name: Playwright Security Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Avoids re-pulling the ~1.3GB chatbot model on every run
      - name: Cache Ollama model data
        uses: actions/cache@v4
        with:
          path: .ollama-data
          key: ${{ runner.os }}-ollama-llama3.2-1b

      # Start early to overlap with dependency installation
      - name: Start Juice Shop
        run: docker compose up -d

      - name: Download Allure history
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name: allure-history
          path: allure-history

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache Playwright browser binaries
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pom.xml') }}

      - name: Download Playwright browser binaries
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: mvn exec:java -e -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install chromium"

      - name: Install Playwright OS dependencies
        run: mvn exec:java -e -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install-deps chromium"

      - name: Wait for Juice Shop to be healthy
        # Juice Shop's container won't even start until the ollama service reports healthy
        # (depends_on: condition: service_healthy), so this wait also covers a cold-cache
        # Ollama model pull (~1.3GB) — generous on a cache miss, fast once cached.
        run: |
          echo "Waiting for Juice Shop on port 3000..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null; then
              echo "Juice Shop is ready after ${i}0 seconds"
              exit 0
            fi
            echo "Attempt $i/30 — retrying in 10s"
            sleep 10
          done
          echo "ERROR: Juice Shop did not become healthy within 300 seconds"
          docker compose logs ollama juice-shop
          exit 1

      - name: Run security tests
        # continue-on-error preserves reporting when vulnerabilities are detected
        continue-on-error: true
        run: mvn test

      - name: Update Allure history
        # Allure 3 tracks history as a single accumulating history.jsonl (one line per run),
        # not the per-run "history/" folder Allure 2 used. `allure history` appends this run's
        # results onto the file restored above, or starts a fresh one on the first-ever run.
        run: |
          mkdir -p allure-history
          npx --yes allure@3.14.3 history target/allure-results --history-path allure-history/history.jsonl

      - name: Generate Allure report
        # Allure Report 3 (Node-based) instead of the Java allure-maven plugin — its default
        # report renders Playwright trace attachments as an embedded, interactive Trace Viewer
        # (via trace.playwright.dev) instead of a plain zip download. `--history-path` feeds in
        # the accumulated history.jsonl so each test's History tab shows its trend across runs.
        run: npx --yes allure@3.14.3 awesome target/allure-results --history-path allure-history/history.jsonl --output target/allure-report --report-name "Security Test Report"

      - name: Save Allure history artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-history
          path: allure-history/history.jsonl
          retention-days: 30

      - name: Prepare GitHub Pages deployment bundle
        run: |
          mkdir -p pages-deploy/allure
          cp -r target/allure-report/. pages-deploy/allure/
          cat > pages-deploy/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0; url=allure/index.html">
            <title>Security Test Report</title>
          </head>
          <body>
            <p>Redirecting to <a href="allure/index.html">Allure Security Report</a>…</p>
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-deploy

  deploy:
    needs: test
    if: always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
