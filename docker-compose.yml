services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ./.ollama-data:/root/.ollama
    restart: unless-stopped
    entrypoint: [ "/bin/sh", "-c", "ollama serve & sleep 3 && ollama pull llama3.2:1b && wait" ]
    healthcheck:
      test: [ "CMD-SHELL", "ollama list | grep -q llama3.2:1b || exit 1" ]
      interval: 10s
      timeout: 10s
      retries: 60
      start_period: 30s

  juice-shop:
    image: bkimminich/juice-shop:latest
    ports:
      - "3000:3000"
    restart: unless-stopped
    # Points the chatbot at the local Ollama service instead of its unreachable default
    # (localhost:11434) so scenarios exercising the chatbot's tool calls actually work.
    environment:
      - 'NODE_CONFIG={"application":{"chatBot":{"llmApiUrl":"http://ollama:11434/v1","model":"llama3.2:1b"}}}'
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
